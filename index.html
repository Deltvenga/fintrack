<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#059669" />
    <meta name="description" content="Совместный учёт расходов" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Fintrack" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Fintrack</title>
  </head>
  <body>
    <script>
      ;(function () {
        var key = 'fintrack-theme'
        var stored = localStorage.getItem(key)
        if (stored === 'girly') {
          document.documentElement.classList.add('girly')
          document.documentElement.style.colorScheme = 'light'
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', '#f9a8d4')
          return
        }
        if (stored === 'girly2') {
          document.documentElement.classList.add('girly2')
          document.documentElement.style.colorScheme = 'light'
          var meta2 = document.querySelector('meta[name="theme-color"]')
          if (meta2) meta2.setAttribute('content', '#c4b5fd')
          return
        }
        var dark =
          stored === 'dark' ||
          (stored !== 'light' &&
            stored !== 'girly' &&
            stored !== 'girly2' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
        if (dark) {
          document.documentElement.classList.add('dark')
          document.documentElement.style.colorScheme = 'dark'
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', '#020617')
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
